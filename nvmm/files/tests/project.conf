targets=fixme.log,shlint.log,tests.log
dist=Makefile,fixme.sh,shlint.sh,tests.sh

#targets
[fixme.log]
type=script
script=./fixme.sh
enabled=0
depends=fixme.sh

[shlint.log]
type=script
script=./shlint.sh
enabled=0
depends=shlint.sh

[tests.log]
type=script
script=./tests.sh
enabled=0
depends=./tests.sh
