package=Hardening
version=3

targets=libHardening,hardening
cflags=-g
ldflags=
dist=Makefile,README.md,lib.h

[libHardening]
type=library
sources=lib.c
cflags=-fPIC
install=$(LIBDIR)

[hardening]
type=binary
depends=$(OBJDIR)libHardening$(SOEXT)
sources=hardening.c
#XXX should be added by pkgsrc itself
#cflags=-fPIE
ldflags=-L$(OBJDIR). -lHardening
install=$(BINDIR)

[lib.c]
depends=lib.h

[hardening.c]
depends=lib.h
