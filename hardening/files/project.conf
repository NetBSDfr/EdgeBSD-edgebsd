package=Hardening
version=2

targets=libHardening,hardening
cflags=-W -Wall -g -O2
ldflags=
dist=Makefile,README.md,lib.h

[libHardening]
type=library
sources=lib.c
cflags=-fPIC
install=$(LIBDIR)

[hardening]
type=binary
depends=$(OBJDIR)libHardening$(SOEXT)
sources=main.c
#XXX should be added by pkgsrc itself
#cflags=-fPIE
ldflags=-L$(OBJDIR). -lHardening
install=$(BINDIR)

[lib.c]
depends=lib.h

[main.c]
depends=lib.h
